{% extends "base.html" %}
{% block content %}

<div class="booking-wrapper">
  <div class="booking-card">
    <h2>📝 Booking Form</h2>
    <form method="POST" action="{{ url_for('auth.book') }}" id="booking-form">

      <!-- Basic Info -->
      <div class="form-group">
        <label>Name:</label>
        <input type="text" name="name" required placeholder="Your full name">
      </div>

      <div class="form-group">
        <label>Mobile Number:</label>
        <input type="tel" name="mobile" required placeholder="Mobile number">
      </div>

      <div class="form-group">
        <label>Address:</label>
        <textarea name="address" placeholder="Your address"></textarea>
      </div>

      <div class="form-group">
        <label>Deposit:</label>
        <input type="text" name="deposit" placeholder="Deposit details">
      </div>

      <div class="form-group">
        <label>Group:</label>
        <input type="text" name="group" placeholder="Group name (if any)">
      </div>

      <div class="form-group">
        <label>Reference:</label>
        <input type="text" name="reference" placeholder="Reference name">
      </div>

      <hr>

      <!-- Booking Dates & Products -->
      <h3>📅 Booking Dates & Products</h3>
      <div id="booking-container">
        <div class="booking-row">
          <input type="date" name="date" required>
          <input type="text" name="product" required placeholder="Products (comma separated)">
          <button type="button" onclick="removeBookingRow(this)" class="remove-btn" title="Remove this booking">🗑️</button>
        </div>
      </div>

      <button type="button" onclick="addBookingRow()" class="add-btn">➕ Add Another Date & Products</button><br><br>
       


      <div class="form-group">
        <label>Total Price:</label>
        <input type="number" name="price" min="0" value="0" required>
      </div>

      
      <div class="form-group">
        <label>Given Price:</label>
        <input type="number" name="given_price" min="0" value="0" required>
      </div>

      
      <button type="submit" class="submit-btn">✅ Submit Booking</button>

      
    </form>
  </div>
</div>

<!-- Script -->
<script>
  function addBookingRow() {
    const container = document.getElementById('booking-container');
    const row = document.createElement('div');
    row.className = 'booking-row';
    row.innerHTML = `
      <input type="date" name="date" required>
      <input type="text" name="product" required placeholder="Products (comma separated)">
      <button type="button" onclick="removeBookingRow(this)" class="remove-btn" title="Remove this booking">🗑️</button>
    `;
    container.appendChild(row);
  }

  function removeBookingRow(button) {
    const container = document.getElementById('booking-container');
    if (container.children.length > 1) {
      button.parentElement.remove();
    } else {
      alert("At least one booking row is required!");
    }
  }
</script>

<!-- Style -->
<style>
  .booking-wrapper {
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }

  .booking-card {
    max-width: 600px;
    width: 100%;
    background: #ffffff;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    transition: 0.3s ease;
  }

  .booking-card:hover {
    transform: scale(1.01);
  }

  h2, h3 {
    margin-bottom: 20px;
    color: #222;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
    color: #555;
  }

  input[type="text"],
  input[type="tel"],
  input[type="number"],
  input[type="date"],
  textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 16px;
    transition: border 0.3s;
  }

  input:focus,
  textarea:focus {
    border-color: #4caf50;
    outline: none;
  }

  textarea {
    resize: vertical;
    min-height: 60px;
  }

  .booking-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 12px;
  }

  .add-btn,
  .submit-btn,
  .remove-btn {
    padding: 10px 16px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  .add-btn {
    background-color: #00bcd4;
    color: white;
    margin-bottom: 20px;
  }

  .add-btn:hover {
    background-color: #0097a7;
  }

  .submit-btn {
    background-color: #4caf50;
    color: white;
    width: 100%;
    margin-top: 10px;
  }

  .submit-btn:hover {
    background-color: #388e3c;
  }

  .remove-btn {
    background-color: #f44336;
    color: white;
  }

  .remove-btn:hover {
    background-color: #d32f2f;
  }

  hr {
    margin: 30px 0;
    border: none;
    border-top: 1px solid #ddd;
  }

  @media (max-width: 600px) {
    .booking-row {
      flex-direction: column;
      gap: 6px;
    }
  }
</style>

{% endblock %}
