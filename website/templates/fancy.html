{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="mb-4 text-center">🎭 Fancy Dress Booking Form</h2>
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" name="name" id="name" required>
                </div>
                <div class="col-md-6">
                    <label for="mobile" class="form-label">Mobile Number</label>
                    <input type="tel" class="form-control" name="mobile" id="mobile" pattern="[0-9]{10}" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="start_date" class="form-label">Start Date</label>
                    <input type="date" class="form-control" name="start_date" id="start_date" required>
                </div>
                <div class="col-md-6">
                    <label for="end_date" class="form-label">End Date</label>
                    <input type="date" class="form-control" name="end_date" id="end_date" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="price" class="form-label">Price (₹)</label>
                    <input type="number" class="form-control" name="price" id="price" required>
                </div>
                <div class="col-md-6">
                    <label for="costume" class="form-label">Costume</label>
                    <input type="text" class="form-control" name="costume" id="costume" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="details" class="form-label">Details / Notes</label>
                <textarea class="form-control" name="details" id="details" rows="3" placeholder="Any extra information..."></textarea>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success px-5">Submit Booking</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
